<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Amazon Seller AI Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">📊 Amazon Seller AI</a>
            <ul class="nav-links">
                <li><a href="/dashboard" class="{% if title == 'Dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="/products" class="{% if title == '商品管理' or title == '新增商品' or title == '编辑商品' %}active{% endif %}">Products</a></li>
                <li><a href="/competitors" class="{% if title == '竞品分析' or title == '新增竞品' or title == '编辑竞品' %}active{% endif %}">Competitors</a></li>
                <li><a href="/profit" class="{% if title == '利润计算器' %}active{% endif %}">Profit</a></li>
                <li><a href="/ai/reviews" class="{% if title == 'AI 评论分析' %}active{% endif %}">AI Reviews</a></li>
                <li><a href="/ai/listing-optimizer" class="{% if title == 'AI Listing 优化' %}active{% endif %}">AI Listing</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <p>Amazon Seller AI Dashboard — 跨境电商 AI 数据后台（学习/演示版）</p>
    </footer>
</body>
</html>
