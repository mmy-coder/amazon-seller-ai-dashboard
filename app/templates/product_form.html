{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>{% if action == 'edit' %}✏️ 编辑商品{% else %}➕ 新增商品{% endif %}</h1>
    <a href="/products" class="btn">← 返回列表</a>
</div>

<div class="card form-card">
    <div class="card-body">
        <form method="post"
              action="{% if action == 'edit' %}/products/{{ product.id }}/update{% else %}/products{% endif %}"
              class="form">
            <div class="form-group">
                <label class="form-label">商品名 <span class="required">*</span></label>
                <input type="text" name="name" class="form-input" required
                       value="{{ product.name if product else '' }}"
                       placeholder="如：Wireless Neck Fan">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">类目</label>
                    <input type="text" name="category" class="form-input"
                           value="{{ product.category if product else '' }}"
                           placeholder="如：Personal Cooling">
                </div>
                <div class="form-group">
                    <label class="form-label">平台</label>
                    <select name="platform" class="form-input">
                        <option value="Amazon" {% if product and product.platform == 'Amazon' %}selected{% endif %}>Amazon</option>
                        <option value="Walmart" {% if product and product.platform == 'Walmart' %}selected{% endif %}>Walmart</option>
                        <option value="eBay" {% if product and product.platform == 'eBay' %}selected{% endif %}>eBay</option>
                        <option value="Shopify" {% if product and product.platform == 'Shopify' %}selected{% endif %}>Shopify</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">采购成本（¥人民币）<span class="required">*</span></label>
                    <input type="number" name="purchase_cost" class="form-input" step="0.01" min="0"
                           value="{{ product.purchase_cost if product else '0' }}">
                </div>
                <div class="form-group">
                    <label class="form-label">售价（$美元）<span class="required">*</span></label>
                    <input type="number" name="selling_price" class="form-input" step="0.01" min="0"
                           value="{{ product.selling_price if product else '0' }}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">库存</label>
                    <input type="number" name="inventory" class="form-input" min="0"
                           value="{{ product.inventory if product else '0' }}">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-input">
                        <option value="active" {% if product and product.status == 'active' %}selected{% endif %}>在售 Active</option>
                        <option value="testing" {% if product and product.status == 'testing' %}selected{% endif %}>测试中 Testing</option>
                        <option value="stopped" {% if product and product.status == 'stopped' %}selected{% endif %}>已停售 Stopped</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    {% if action == 'edit' %}保存修改{% else %}创建商品{% endif %}
                </button>
                <a href="/products" class="btn">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
